services:
  db:
    restart: always
    image: postgres:16
    command: ["postgres", "-c", "log_statement=all"]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U shortener" ]
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      POSTGRES_USER: shortener
      POSTGRES_PASSWORD: shortener
      POSTGRES_DB: shortener
    ports:
      - "5432:5432"

  migrate:
    build: .
    command: alembic upgrade head
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    restart: on-failure

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://shortener:shortener@db:5432/shortener
      BASE_URL: http://localhost:8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
